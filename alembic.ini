# alembic.ini
[alembic]
# path to migration scripts
script_location = migrations
# Make the project root importable so migrations/env.py can `from app.infra.db
# import Base` regardless of how alembic is invoked (docker compose, CI, or
# local). Without this, only the migrate container's ENV PYTHONPATH made it
# work — and CI doesn't set that.
prepend_sys_path = .
# sqlalchemy.url will be set from the environment variable DATABASE_URL in env.py, so we leave it empty here
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S