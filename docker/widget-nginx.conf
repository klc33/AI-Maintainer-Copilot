server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # CORS: the loader runs on the host page's origin and fetches widget.js
    # cross-origin. Keep this permissive — the bundle is public.
    add_header Access-Control-Allow-Origin "*" always;

    # The loader stub. Small file; short cache so admins can iterate quickly
    # without a host operator having to bust the cache.
    location = /widget.js {
        alias /usr/share/nginx/html/widget.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "public, max-age=300";  # 5 min
        add_header Access-Control-Allow-Origin "*";
    }

    # Vite-emitted hashed bundles (e.g. widget.js, asset hashes) live under
    # /widget/. Hashed filenames are content-addressed → safe to cache hard.
    location /widget/ {
        alias /usr/share/nginx/html/widget/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
