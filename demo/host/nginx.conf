server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA-ish: any unmatched path falls back to index.html so query-param
        # routing works even if a user refreshes on /?widget=foo.
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the api service so the demo host can call the FastAPI
    # backend same-origin (no CORS plumbing on either side).
    # Strips the /api prefix before forwarding.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Streaming-friendly: don't buffer SSE responses.
        proxy_buffering   off;
        proxy_read_timeout 300s;
    }
}
