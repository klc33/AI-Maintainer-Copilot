# eval_thresholds.yaml — what counts as a regression.
#
# Two gates per metric:
#   min_absolute      — hard floor; if current < this, fail regardless of history
#   max_relative_drop — soft floor; fail if current is more than X% below the
#                       previous green build (e.g. 0.15 = a 15% drop fails)
#
# The numbers below are tuned for the small CI fixture corpus
# (evals/fixtures/{chunks,golden}.jsonl + classification_test.csv).
# When the production corpus is also wired into CI, re-tune.

rag:
  hit_at_5:
    min_absolute: 0.50   # fixture answers are easy; current ~1.0
    max_relative_drop: 0.15
  mrr_at_10:
    min_absolute: 0.40
    max_relative_drop: 0.15

# Classifier retrained 2026-05-21 in Colab (notebooks/train_classifier.ipynb).
# Production val set: macro_f1=0.66, accuracy=0.80, every class F1>0
# (see models/classifier/v1/model_card.json).
#
# In CI the classifier checkpoint isn't shipped (256 MB, gitignored), so
# evals/classification/run.py falls back to a TF-IDF baseline trained on the
# 16-row fixture, which typically lands at macro_f1≈0.10, accuracy≈0.25.
# The min_absolute values below catch a complete classifier breakdown
# (single-class prediction → macro_f1=0) while still letting the TF-IDF
# baseline pass with a small margin.
classification:
  macro_f1:
    min_absolute: 0.08
    max_relative_drop: 0.20
  accuracy:
    min_absolute: 0.22
    max_relative_drop: 0.20
